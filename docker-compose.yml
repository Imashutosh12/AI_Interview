version: '3.8'

services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:15-alpine
    container_name: intervai_postgres
    environment:
      POSTGRES_DB: intervai_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: yourpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d intervai_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - intervai_network
    restart: unless-stopped

  # Backend FastAPI Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: intervai_backend
    environment:
      DATABASE_URL: postgresql://admin:yourpassword@postgres:5432/intervai_db
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ENVIRONMENT: production
      SECRET_KEY: ${SECRET_KEY}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - intervai_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Frontend React Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: intervai_frontend
    environment:
      REACT_APP_API_URL: http://localhost:8000
      REACT_APP_ENVIRONMENT: production
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
    networks:
      - intervai_network
    restart: unless-stopped

  # Redis Cache Service (Optional)
  redis:
    image: redis:7-alpine
    container_name: intervai_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - intervai_network
    restart: unless-stopped
volumes:  
    driver: local  
    driver: local  
networks:  
  intervai_network:  
    driver: bridge 
 
volumes: 
  postgres_data: 
    driver: local 
  redis_data: 
    driver: local 
 
networks: 
  intervai_network: 
    driver: bridge
